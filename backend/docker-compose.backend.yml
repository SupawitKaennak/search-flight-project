# Docker Compose สำหรับ Backend เท่านั้น
# ใช้คำสั่ง: docker-compose -f docker-compose.backend.yml up -d
# หมายเหตุ: ต้องมี database service ทำงานอยู่ก่อน (จาก docker-compose.database.yml)

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flight_search_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env.backend
    environment:
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: ${DB_HOST:-flight_search_db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-flight_search}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      ENABLE_TIMESCALEDB: ${ENABLE_TIMESCALEDB:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-1000}
      ENABLE_SCHEDULED_JOBS: ${ENABLE_SCHEDULED_JOBS:-false}
    # หมายเหตุ: depends_on ถูกลบออกเพราะใช้ database แยก
    # ตรวจสอบให้แน่ใจว่า database container ทำงานอยู่ก่อนรัน backend
    networks:
      - flight_network
    volumes:
      # Mount data directory for importing flight data
      - ./data:/app/data

  # หมายเหตุ: ถ้าใช้ database แยก (docker-compose.database.yml) 
  # ให้เปลี่ยน DB_HOST ใน environment เป็น "postgres" หรือชื่อ container ของ database
  # และต้องสร้าง network "flight_network" ก่อน:
  # docker network create flight_network

networks:
  flight_network:
    external: true
    name: flight_network
