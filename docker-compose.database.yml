# Docker Compose สำหรับ Database เท่านั้น
# ใช้คำสั่ง: docker-compose -f docker-compose.database.yml up -d

services:
  postgres:
    image: timescale/timescaledb:latest-pg18
    container_name: flight_search_db
    restart: unless-stopped
    env_file:
      - .env.database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-flight_search}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---encoding=UTF8 --locale=C}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flight_search"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - flight_network

volumes:
  postgres_data:
    driver: local

networks:
  flight_network:
    external: true
    name: flight_network
