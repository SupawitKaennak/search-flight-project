# Render Blueprint Configuration
# ใช้สำหรับ deploy บน Render.com
# วิธีใช้: สร้าง Blueprint จาก GitHub repo นี้
# 
# หมายเหตุ: หลัง deploy แล้วต้องตั้งค่า environment variables เพิ่มเติม:
# - Backend: CORS_ORIGIN (ใช้ frontend URL)
# - Frontend: NEXT_PUBLIC_API_URL (ใช้ backend URL)

services:
  # Backend API Service
  - type: web
    name: flight-search-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free  # Free tier: 750 hours/month
    region: singapore  # เลือก region ที่ใกล้ที่สุด
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        fromDatabase:
          name: flight-search-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: flight-search-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: flight-search-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: flight-search-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: flight-search-db
          property: password
      - key: ENABLE_TIMESCALEDB
        value: "true"
      - key: CORS_ORIGIN
        generateValue: true  # ต้องแก้ไขเป็น frontend URL หลัง deploy
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "1000"
      - key: ENABLE_SCHEDULED_JOBS
        value: "false"
      - key: AUTO_MIGRATE
        value: "true"
    healthCheckPath: /api/health

  # Frontend Web Service
  - type: web
    name: flight-search-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free  # Free tier: 750 hours/month
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        generateValue: true  # ต้องแก้ไขเป็น backend URL หลัง deploy
      - key: NEXT_PUBLIC_USE_MOCK_DATA
        value: "false"
      - key: NEXT_PUBLIC_OPENWEATHERMAP_API_KEY
        generateValue: true  # Optional: ตั้งค่าถ้าต้องการใช้ weather API

databases:
  # PostgreSQL Database (Managed Service)
  - name: flight-search-db
    plan: starter  # Free tier: starter (90 days free trial)
    region: singapore
    databaseName: flight_search
    user: flightsearch_user
    postgresMajorVersion: "18"
    # TimescaleDB extension จะถูก enable ผ่าน migration script
